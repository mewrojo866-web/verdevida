<!DOCTYPE html>
<html lang="es">

<head>

<meta charset="UTF-8">

<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">

<title>Memory Master Pro</title>

<link rel="stylesheet" href="estilos.css">

<script src="https://aframe.io/releases/1.4.0/aframe.min.js"></script>

</head>

<body>

<a-scene embedded>

<a-sky color="#020617"></a-sky>

<a-plane
position="0 0 -4"
rotation="-90 0 0"
width="30"
height="30"
color="#0f172a">
</a-plane>

<a-entity light="type:ambient; intensity:0.8"></a-entity>

<a-entity light="type:directional; intensity:1" position="2 4 3"></a-entity>

<a-camera position="0 1.6 4"></a-camera>

</a-scene>


<section id="pantallaInicio" class="modal-full">

<h1 class="game-title">
MEMORY
<span>MASTER</span>
</h1>

<button class="btn-main-play" onclick="iniciarJuego()">
¡JUGAR!
</button>

</section>


<main class="game-container">

<header class="hud">

<div class="pill">
⭐ SCORE:
<span id="puntos">0</span>
</div>

<div class="pill timer">
⏳
<span id="tiempo">60</span>s
</div>

</header>


<div id="tablero" class="grid-board"></div>


<nav class="footer-controls">

<button class="btn-action" onclick="reiniciarJuego()">
🔄 Reiniciar
</button>

<button class="btn-action" onclick="salirAlMenu()">
🏠 Menú
</button>

</nav>

</main>


<div id="victoria" class="modal-overlay">

<div class="card-result">

<h2>🏆 ¡EXCELENTE!</h2>

<p>Puntuación lograda:</p>

<h3 id="puntuacionFinal">0</h3>

<button class="btn-main-play" onclick="reiniciarJuego()">
SIGUIENTE NIVEL
</button>

</div>

</div>


<div id="finJuego" class="modal-overlay">

<div class="card-result danger">

<h2>⏰ TIEMPO AGOTADO</h2>

<p>¡Inténtalo de nuevo!</p>

<button class="btn-main-play" onclick="reiniciarJuego()">
REINTENTAR
</button>

</div>

</div>


<audio id="sonidoVoltear" src="carta.mp3"></audio>
<audio id="sonidoAcierto" src="acierto.mp3"></audio>
<audio id="sonidoVictoria" src="victoria.mp3"></audio>


<script src="script.js"></script>

</body>
</html>
