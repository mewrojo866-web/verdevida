        .box {
            background: #1c1c1c;

            color: white;
            box-shadow: 0px 10px 20px rgba(0,0,0,0.5);

        input {
            width: 100%;

            border: none;
            border-radius: 5px;

        /* Botón principal rosa */
        .btn-registro {

            border-radius: 5px;
            cursor: pointer;
            font-weight: bold;
            margin-top: 10px;
        }

        /* Botón para enviar el código (estilo diferente) */
        .btn-verificar {
            background: transparent;
            border: 1px solid #ff004f;
            color: #ff004f;
            margin-bottom: 10px;
        }

        .btn-verificar:hover {
            background: #ff004f;
            color: white;
        }

        a {
            color: #00aaff;
            text-decoration: none;
        }

        #seccion-codigo {
            margin-top: 15px;
            padding-top: 15px;
            border-top: 1px solid #333;

<script>
    function mostrarCodigo() {
        const email = document.getElementById('email').value;
        if(email === "") {
            alert("Por favor, ingresa tu correo primero.");
            return;
        }
        // Mostramos la sección del código y la contraseña
        document.getElementById('seccion-codigo').style.display = 'block';
        alert("Se ha enviado un código de prueba a: " + email);
    }
</script>
